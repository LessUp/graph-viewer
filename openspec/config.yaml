# OpenSpec Configuration for GraphViewer
# https://github.com/Fission-AI/OpenSpec

project:
  name: graph-viewer
  description: Multi-engine diagram visualization tool

context: |
  GraphViewer is a Next.js 15 + React 19 application for visualizing 16+ diagram engines.

  Tech Stack:
  - Framework: Next.js 15 (App Router) + React 19
  - Language: TypeScript (strict mode)
  - Styling: Tailwind CSS
  - Testing: Vitest
  - Runtime: Node.js 22

  Architecture:
  - Hybrid rendering: Local WASM (Mermaid, Graphviz) + Remote Kroki proxy
  - Two deployment modes: Full Server / Static Export
  - localStorage persistence with LZ-string URL sharing

  Core Data Structure:
  - DiagramDoc { id, name, engine, format, code, updatedAt }

  Key Constraints:
  - UI text must be in Chinese
  - Engine/format values must come from lib/diagramConfig.ts
  - Every change requires a changelog entry in changelog/YYYY-MM-DD-slug.md

rules:
  - "UI text must be in Chinese (中文)"
  - "Engine/format values must come from lib/diagramConfig.ts"
  - "Every change requires a changelog entry"
  - "Follow the 10-file sync checklist for engine/format changes"
  - "Use 'use client' only when necessary (hooks, event handlers, browser APIs)"

profile: core
