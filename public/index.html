<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="GraphViewer - All-in-One Diagram Viewer with 16+ Engines">
  <title>GraphViewer</title>
  <link rel="icon" href="/graph-viewer/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid #334155;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { margin-top: 1rem; opacity: 0.7; }
  </style>
  <script>
    // Redirect to base path if accessing root
    if (window.location.pathname === '/' || window.location.pathname === '') {
      window.location.href = '/graph-viewer/';
    }
  </script>
</head>
<body>
  <div class="loader"></div>
  <p>Loading GraphViewer...</p>
</body>
</html>
