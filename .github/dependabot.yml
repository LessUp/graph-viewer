version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "LessUp/maintainers"
    assignees:
      - "LessUp/maintainers"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
      include: "scope"
    labels:
      - "dependencies"
    # Group update types
    groups:
      # Security updates
      security:
        applies-to: "security-updates"
        patterns:
          - "*"
      # Development dependencies
      dev-dependencies:
        applies-to: "version-updates"
        dependency-type: "development"
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "vitest"
      # Production dependencies - React ecosystem
      react-ecosystem:
        applies-to: "version-updates"
        dependency-type: "production"
        patterns:
          - "react"
          - "react-dom"
          - "next"
      # Production dependencies - UI libraries
      ui-libraries:
        applies-to: "version-updates"
        dependency-type: "production"
        patterns:
          - "lucide-react"
          - "@uiw/react-codemirror"
          - "@codemirror/*"
      # Production dependencies - Diagram engines
      diagram-engines:
        applies-to: "version-updates"
        dependency-type: "production"
        patterns:
          - "mermaid"
          - "@hpcc-js/wasm"
    # Ignore certain dependencies if needed
    ignore:
      # Mermaid major versions need careful testing
      - dependency-name: "mermaid"
        update-types: ["version-update:semver-major"]

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "LessUp/maintainers"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
