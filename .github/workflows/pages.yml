name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'scripts/build-static-export.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
        id: pages

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:static

      - name: Generate sitemap
        run: node scripts/generate-sitemap.mjs
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          OUTPUT_DIR: ./out

      - name: Setup SPA routing
        run: |
          # 确保 404.html 存在
          if [ ! -f "./out/404.html" ]; then
            cp ./out/index.html ./out/404.html
          fi

          # 确保 editor 目录存在
          if [ ! -d "./out/editor" ]; then
            mkdir -p ./out/editor
            REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
            printf '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=/${REPO_NAME}/"><script>window.location.href="/${REPO_NAME}/";</script></head><body>Redirecting...</body></html>' > ./out/editor/index.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
