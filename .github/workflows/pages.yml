name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'scripts/build-static-export.mjs'
      - 'scripts/generate-sitemap.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:
    inputs:
      skip_checks:
        description: 'Skip validation checks'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-${{ github.ref }}'
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate
    if: inputs.skip_checks != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  build:
    name: Build
    needs: [validate]
    if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
        id: pages
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('package-lock.json') }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build static export
        run: npm run build:static
      
      - name: Generate sitemap
        run: |
          node scripts/generate-sitemap.mjs
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}
          OUTPUT_DIR: ./out
      
      - name: Setup SPA routing
        run: |
          # GitHub Pages uses 404.html for SPA routing
          # We keep the custom 404.html from public/ which has intelligent redirect
          # GitHub Pages 使用 404.html 进行 SPA 路由
          # 我们保留 public/ 中的自定义 404.html，它具有智能重定向功能
          if [ -f "./out/404.html" ]; then
            echo "✅ 404.html exists (processed by Next.js)"
          else
            cp ./out/index.html ./out/404.html
            echo "✅ Created 404.html from index.html"
          fi
          
          # Ensure editor directory exists for client-side routing
          # 确保 editor 目录存在以支持客户端路由
          if [ ! -d "./out/editor" ]; then
            mkdir -p ./out/editor
            REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
            cat > ./out/editor/index.html << INDEXEOF
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0;url=/${REPO_NAME}/">
              <script>
                var basePath = '/${REPO_NAME}';
                window.location.href = basePath + '/?redirect=' + encodeURIComponent(window.location.pathname);
              </script>
            </head>
            <body>
              <p>Loading GraphViewer...</p>
            </body>
            </html>
            INDEXEOF
            echo "✅ Created editor/index.html for SPA routing"
          fi
          
          # Repository name for logging
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          echo "📍 Base Path: /${REPO_NAME}"
      
      - name: Inject build info
        run: |
          # Add build metadata for debugging
          # 添加构建元数据用于调试
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          cat > ./out/build-info.json << EOF
          {
            "buildTime": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "repository": "${{ github.repository }}",
            "basePath": "/${REPO_NAME}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "runId": "${{ github.run_id }}"
          }
          EOF
          
          echo "✅ Created build-info.json"
      
      - name: Add security headers config
        run: |
          # Add security headers for GitHub Pages
          # 为 GitHub Pages 添加安全响应头
          cat > ./out/_headers << 'EOF'
          /*
            X-Frame-Options: DENY
            X-Content-Type-Options: nosniff
            Referrer-Policy: strict-origin-when-cross-origin
            Permissions-Policy: accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()
          /*.js
            Cache-Control: public, max-age=31536000, immutable
          /*.css
            Cache-Control: public, max-age=31536000, immutable
          /*.svg
            Cache-Control: public, max-age=31536000, immutable
          /*.woff2
            Cache-Control: public, max-age=31536000, immutable
          EOF
          
          echo "✅ Created _headers configuration"
      
      - name: Build Summary Report
        id: build-summary
        run: |
          echo "=== 📊 Build Summary ==="
          echo ""
          
          # Get build info
          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          
          # Calculate metrics
          TOTAL_SIZE=$(du -sh ./out/ | cut -f1)
          TOTAL_SIZE_BYTES=$(du -sb ./out/ | cut -f1)
          FILE_COUNT=$(find ./out/ -type f | wc -l)
          HTML_COUNT=$(find ./out/ -name "*.html" | wc -l)
          JS_COUNT=$(find ./out/ -name "*.js" | wc -l)
          CSS_COUNT=$(find ./out/ -name "*.css" | wc -l)
          
          # Size breakdown
          JS_SIZE=$(find ./out/ -name "*.js" -exec du -sb {} + | awk '{sum+=$1} END {printf "%.2f", sum/1024/1024}')
          CSS_SIZE=$(find ./out/ -name "*.css" -exec du -sb {} + | awk '{sum+=$1} END {printf "%.2f", sum/1024/1024}')
          
          echo "📦 Build Information"
          echo "   Time: $BUILD_TIME"
          echo "   Commit: ${{ github.sha }}"
          echo "   Repository: ${{ github.repository }}"
          echo ""
          
          echo "📊 Build Metrics"
          echo "   Total Size: $TOTAL_SIZE"
          echo "   Total Files: $FILE_COUNT"
          echo "   HTML Files: $HTML_COUNT"
          echo "   JS Files: $JS_COUNT"
          echo "   CSS Files: $CSS_COUNT"
          echo ""
          
          echo "📁 Size Breakdown"
          echo "   JavaScript: ${JS_SIZE} MB"
          echo "   CSS: ${CSS_SIZE} MB"
          echo ""
          
          # Check size limits
          SIZE_LIMIT_MB=50
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE_BYTES / 1024 / 1024" | bc)
          
          if (( $(echo "$TOTAL_SIZE_MB > $SIZE_LIMIT_MB" | bc -l) )); then
            echo "⚠️  WARNING: Build size exceeds ${SIZE_LIMIT_MB}MB limit!"
            echo "   Current size: ${TOTAL_SIZE_MB} MB"
          else
            echo "✅ Build size OK (${TOTAL_SIZE_MB} MB < ${SIZE_LIMIT_MB} MB)"
          fi
          
          echo ""
          
          # Output to GitHub Actions summary
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | $BUILD_TIME |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Size | **$TOTAL_SIZE** |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Files | $FILE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📁 Assets Breakdown" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Count | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| HTML | $HTML_COUNT | - |" >> $GITHUB_STEP_SUMMARY
          echo "| JavaScript | $JS_COUNT | ${JS_SIZE} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| CSS | $CSS_COUNT | ${CSS_SIZE} MB |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Store outputs for deploy job
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "total_size_mb=$TOTAL_SIZE_MB" >> $GITHUB_OUTPUT
          
          # Store in file for deploy job
          cat > ./build-summary.json << EOF
          {
            "buildTime": "$BUILD_TIME",
            "totalSize": "$TOTAL_SIZE",
            "totalSizeMB": $TOTAL_SIZE_MB,
            "fileCount": $FILE_COUNT,
            "htmlCount": $HTML_COUNT,
            "jsCount": $JS_COUNT,
            "cssCount": $CSS_COUNT,
            "jsSizeMB": $JS_SIZE,
            "cssSizeMB": $CSS_SIZE
          }
          EOF
          
          cp ./build-summary.json ./out/build-summary.json
          echo "✅ Created build-summary.json"
      
      - name: Verify build output
        run: |
          echo "=== Build Output Structure ==="
          ls -la ./out/
          
          echo ""
          echo "=== Key Files Check ==="
          test -f ./out/index.html && echo "✅ index.html exists (Next.js app entry)" || echo "❌ index.html missing"
          test -f ./out/404.html && echo "✅ 404.html exists (SPA fallback)" || echo "❌ 404.html missing"
          test -f ./out/sitemap.xml && echo "✅ sitemap.xml exists (SEO)" || echo "❌ sitemap.xml missing"
          test -f ./out/build-info.json && echo "✅ build-info.json exists" || echo "❌ build-info.json missing"
          test -f ./out/manifest.json && echo "✅ manifest.json exists" || echo "❌ manifest.json missing"
          test -f ./out/favicon.svg && echo "✅ favicon.svg exists" || echo "⚠️ favicon.svg missing"
          
          echo ""
          echo "=== File Sizes (Top 20) ==="
          du -sh ./out/* 2>/dev/null | sort -hr | head -20
          
          echo ""
          echo "=== Total Size ==="
          du -sh ./out/
          
          echo ""
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          echo "📦 Repository: ${{ github.repository }}"
          echo "📍 Base Path: /${REPO_NAME}"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
      
      - name: Output deployment info
        run: |
          echo "🚀 Deployment Complete!"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📍 Base Path: /$(echo ${{ github.repository }} | cut -d'/' -f2)"
      
      - name: Post deployment summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deployment.outputs.page_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Visit: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
