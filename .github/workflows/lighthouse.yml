name: Lighthouse CI

on:
  push:
    branches: [master, main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lighthouse.yml'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:static
        env:
          LHCI: 'true'

      # Install Lighthouse CI
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      # Run Lighthouse CI
      - name: Run Lighthouse CI
        run: |
          lhci autorun --config=lighthouse.config.js
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}

      # Upload Lighthouse results as artifact
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-results
          path: |
            .lighthouseci/
            lhci-reports/
          retention-days: 30

      # Post PR comment with Lighthouse scores (for PR events)
      - name: PR comment with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Find the latest LHR (Lighthouse Report) file
            const lhciDir = '.lighthouseci';
            if (!fs.existsSync(lhciDir)) {
              console.log('No Lighthouse results found');
              return;
            }
            
            const files = fs.readdirSync(lhciDir);
            const lhrFiles = files.filter(f => f.startsWith('lhr-') && f.endsWith('.json'));
            
            if (lhrFiles.length === 0) {
              console.log('No LHR files found');
              return;
            }
            
            // Get the most recent file
            const latestFile = lhrFiles.sort().reverse()[0];
            const lhrPath = path.join(lhciDir, latestFile);
            const lhr = JSON.parse(fs.readFileSync(lhrPath, 'utf8'));
            
            // Extract scores
            const scores = {
              performance: Math.round(lhr.categories.performance.score * 100),
              accessibility: Math.round(lhr.categories.accessibility.score * 100),
              'best-practices': Math.round(lhr.categories['best-practices'].score * 100),
              seo: Math.round(lhr.categories.seo.score * 100),
              pwa: Math.round(lhr.categories.pwa.score * 100),
            };
            
            // Get metrics
            const metrics = lhr.audits;
            const fcp = metrics['first-contentful-paint']?.displayValue || 'N/A';
            const lcp = metrics['largest-contentful-paint']?.displayValue || 'N/A';
            const tbt = metrics['total-blocking-time']?.displayValue || 'N/A';
            const cls = metrics['cumulative-layout-shift']?.displayValue || 'N/A';
            const si = metrics['speed-index']?.displayValue || 'N/A';
            
            // Create comment body
            const getScoreBadge = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 50) return '🟡';
              return '🔴';
            };
            
            const body = `## 🚦 Lighthouse Report
            
            | Category | Score |
            |----------|-------|
            | ${getScoreBadge(scores.performance)} Performance | ${scores.performance} |
            | ${getScoreBadge(scores.accessibility)} Accessibility | ${scores.accessibility} |
            | ${getScoreBadge(scores['best-practices'])} Best Practices | ${scores['best-practices']} |
            | ${getScoreBadge(scores.seo)} SEO | ${scores.seo} |
            | ${getScoreBadge(scores.pwa)} PWA | ${scores.pwa} |
            
            ### Core Web Vitals
            
            | Metric | Value |
            |--------|-------|
            | First Contentful Paint | ${fcp} |
            | Largest Contentful Paint | ${lcp} |
            | Total Blocking Time | ${tbt} |
            | Cumulative Layout Shift | ${cls} |
            | Speed Index | ${si} |
            
            *Report generated by [Lighthouse CI](https://github.com/GoogleChrome/lighthouse-ci)*
            `;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existingComment = comments.find(
              comment => comment.user.login === 'github-actions[bot]' &&
                        comment.body.includes('🚦 Lighthouse Report')
            );
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
